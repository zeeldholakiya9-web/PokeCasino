<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokéCasino Random Battle</title>
    <style>
        :root {
            --bg-color: #000;
            --panel-bg: #e0e0e0;
            --border-color: #444;
            --hp-green: #2ecc71;
            --hp-yellow: #f1c40f;
            --hp-red: #e74c3c;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 2px solid #333;
        }

        /* --- SCREENS --- */
        #start-screen, #result-screen {
            position: absolute;
            inset: 0;
            background: #222;
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .btn-main {
            padding: 15px 30px;
            font-size: 18px;
            background: #f1c40f;
            color: #000;
            border: 4px solid #000;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- BATTLE FIELD --- */
        #battle-field {
            flex: 1.2;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            background-image: url('https://i.postimg.cc/5thgc5b5/IMG-20260326-190251-371.jpg'); /* Updated to use the public URL */
            background-size: cover;
            background-position: bottom;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .pokemon-slot {
            position: absolute;
            width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #opponent-active { 
            top: 15%; 
            right: 5%; 
        }

        #player-active { 
            bottom: 5%; 
            left: 5%; 
        }

        .pkmn-img { 
            width: 140px; 
            height: 140px; 
            image-rendering: pixelated; 
            object-fit: contain;
        }
        
        .status-bar {
            background: #fffdf0;
            border: 3px solid #444;
            border-bottom-left-radius: 15px;
            border-top-right-radius: 15px;
            padding: 6px;
            width: 140px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        .name-row { font-size: 14px; font-weight: bold; margin-bottom: 2px; display: flex; justify-content: space-between;}

        .hp-container {
            background: #444;
            height: 8px;
            border: 1px solid #000;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            width: 100%;
            background: var(--hp-green);
            transition: width 0.4s ease-out;
        }

        /* --- UI PANEL --- */
        #ui-panel {
            flex: 0.8;
            background: var(--panel-bg);
            border-top: 4px solid #333;
            display: flex;
            flex-direction: column;
        }

        #log {
            padding: 12px;
            background: #fff;
            border: 2px solid #888;
            margin: 8px;
            font-size: 14px;
            height: 60px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 8px 8px 8px;
            flex: 1;
        }

        .move-btn {
            background: #f8f8f8;
            border: 3px solid #555;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset -2px -2px 0px #bbb;
        }

        .move-btn:active { transform: translateY(2px); box-shadow: none; }

        .type-tag { font-size: 9px; text-transform: uppercase; color: #666; }

        .hidden { display: none !important; }

        /* Damage Popups */
        .damage-popup {
            position: absolute;
            color: #e74c3c;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 2px 2px 0px white;
            z-index: 10;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="color: #f1c40f; -webkit-text-stroke: 1px black;">POKÉCASINO</h1>
        <p>RANDOM PIXEL BATTLE</p>
        <button id="btn-start" class="btn-main">Fight!</button>
        <p id="loading-msg" class="hidden">Summoning Pokémon...</p>
    </div>

    <div id="battle-field">
        <div id="opponent-active" class="pokemon-slot">
            <div class="status-bar">
                <div class="name-row"><span id="opp-name">---</span> <span>Lv50</span></div>
                <div class="hp-container"><div id="opp-hp-bar" class="hp-bar"></div></div>
            </div>
            <img id="opp-img" class="pkmn-img" src="">
        </div>

        <div id="player-active" class="pokemon-slot">
            <img id="player-img" class="pkmn-img" src="">
            <div class="status-bar">
                <div class="name-row"><span id="player-name">---</span> <span>Lv50</span></div>
                <div class="hp-container"><div id="player-hp-bar" class="hp-bar"></div></div>
                <div style="font-size: 10px; text-align: right; margin-top: 2px;" id="player-hp-num">0/0</div>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div id="log">Welcome to PokéCasino!</div>
        <div id="controls">
            <button class="move-btn" id="move-0"></button>
            <button class="move-btn" id="move-1"></button>
            <button class="move-btn" id="move-2"></button>
            <button class="move-btn" id="move-3"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="result-title"></h1>
        <button onclick="location.reload()" class="btn-main">New Battle</button>
    </div>
</div>

<script>
    const state = {
        playerTeam: [], aiTeam: [],
        playerIdx: 0, aiIdx: 0,
        busy: false
    };

    const sounds = {
        hit: new Audio('https://raw.githubusercontent.com/Arunanshu99/Pokemon-Game/master/assets/audio/damage.mp3'),
        // Fixed: Use raw.githubusercontent.com for the direct audio file link
        faint: new Audio('https://raw.githubusercontent.com/zeeldholakiya9-web/PokeCasino/3c33080641d4ef1d56ad4cf9c46acc1a47c42ebe/Ruby_0010.wav'),
        button: new Audio('https://raw.githubusercontent.com/Arunanshu99/Pokemon-Game/master/assets/audio/button-click.mp3'),
        battleMusic: new Audio('https://raw.githubusercontent.com/zeeldholakiya9-web/PokeCasino/f4672f02c44b9b9453c1c176a8ecdeb9f2dac0d6/1-26.%20Battle!%20(Trainer%20Battle).mp3'),
        victoryMusic: new Audio('https://raw.githubusercontent.com/zeeldholakiya9-web/PokeCasino/f4672f02c44b9b9453c1c176a8ecdeb9f2dac0d6/1-27.%20Victory!%20(Trainer%20Battle).mp3')
    };

    // Configure loop for battle music
    sounds.battleMusic.loop = true;

    async function init() {
        // Chrome fix: Resume audio context or play a silent sound to "unlock" audio on first click
        Object.values(sounds).forEach(s => {
            s.play().then(() => {
                s.pause();
                s.currentTime = 0;
            }).catch(() => {});
        });

        document.getElementById('btn-start').classList.add('hidden');
        document.getElementById('loading-msg').classList.remove('hidden');
        
        state.playerTeam = await getTeam(true);  // true for back sprites
        state.aiTeam = await getTeam(false); // false for front sprites
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('battle-field').style.display = 'block';

        // Play battle music with reduced volume
        sounds.battleMusic.volume = 0.3;
        sounds.battleMusic.play().catch(e => console.log("Music play error:", e));
        
        updateUI();
        addLog(`A wild **${state.aiTeam[0].name}** appeared!`);
    }

    async function getTeam(isPlayer) {
        const team = [];
        for(let i=0; i<6; i++) {
            const id = Math.floor(Math.random() * 649) + 1; // Limit to Gen 5 for best pixel art
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            
            const hp = data.stats[0].base_stat * 2 + 110;
            team.push({
                name: data.name.toUpperCase(),
                maxHp: hp, hp: hp,
                atk: data.stats[1].base_stat, def: data.stats[2].base_stat, spd: data.stats[5].base_stat,
                types: data.types.map(t => t.type.name),
                // Use Back sprites for player, Front for AI
                img: isPlayer 
                  ? `https://play.pokemonshowdown.com/sprites/ani-back/${data.name}.gif`
                  : `https://play.pokemonshowdown.com/sprites/ani/${data.name}.gif`,
                moves: [
                    { name: 'Tackle', power: 40, type: 'normal' },
                    { name: 'Swift', power: 60, type: 'normal' },
                    { name: 'Strike', power: 75, type: data.types[0].type.name },
                    { name: 'Ultimate', power: 110, type: data.types[0].type.name }
                ]
            });
        }
        return team;
    }

    function updateUI() {
        const p = state.playerTeam[state.playerIdx];
        const a = state.aiTeam[state.aiIdx];

        // Player UI
        document.getElementById('player-name').innerText = p.name;
        document.getElementById('player-hp-num').innerText = `${Math.ceil(p.hp)}/${p.maxHp}`;
        document.getElementById('player-img').src = p.img;
        updateHPBar('player-hp-bar', p.hp, p.maxHp);
        
        // AI UI
        document.getElementById('opp-name').innerText = a.name;
        document.getElementById('opp-img').src = a.img;
        updateHPBar('opp-hp-bar', a.hp, a.maxHp);

        p.moves.forEach((m, i) => {
            const btn = document.getElementById(`move-${i}`);
            btn.innerHTML = `<span>${m.name}</span><span class="type-tag">${m.type}</span>`;
            btn.onclick = () => {
                sounds.button.currentTime = 0;
                sounds.button.play().catch(() => {});
                runTurn(m);
            };
        });
    }

    function updateHPBar(id, current, max) {
        const bar = document.getElementById(id);
        const perc = (current / max) * 100;
        bar.style.width = perc + "%";
        if (perc < 20) bar.style.background = "var(--hp-red)";
        else if (perc < 50) bar.style.background = "var(--hp-yellow)";
        else bar.style.background = "var(--hp-green)";
    }

    async function runTurn(pMove) {
        if(state.busy) return;
        state.busy = true;

        const p = state.playerTeam[state.playerIdx];
        const a = state.aiTeam[state.aiIdx];
        const aMove = a.moves[Math.floor(Math.random()*4)];

        if(p.spd >= a.spd) {
            await attack(p, a, pMove, 'opponent-active');
            if(a.hp > 0) await attack(a, p, aMove, 'player-active');
        } else {
            await attack(a, p, aMove, 'player-active');
            if(p.hp > 0) await attack(p, a, pMove, 'opponent-active');
        }

        checkFaints();
        state.busy = false;
    }

    async function attack(atk, def, move, targetId) {
        addLog(`${atk.name} used **${move.name}**!`);
        await sleep(600);

        let dmg = (((2*50/5+2) * move.power * atk.atk / def.def) / 50) + 2;
        let mod = (Math.random() * (1 - 0.85) + 0.85);
        if(atk.types.includes(move.type)) mod *= 1.5;
        
        const finalDmg = Math.floor(dmg * mod);
        def.hp = Math.max(0, def.hp - finalDmg);

        sounds.hit.currentTime = 0;
        sounds.hit.play().catch(() => {});
        showDamage(targetId, finalDmg);
        
        const imgId = targetId === 'opponent-active' ? 'opp-img' : 'player-img';
        document.getElementById(imgId).style.animation = 'shake 0.2s 2';
        setTimeout(() => document.getElementById(imgId).style.animation = '', 400);
        
        updateUI();
        await sleep(600);
    }

    function showDamage(id, amount) {
        const el = document.getElementById(id);
        const pop = document.createElement('div');
        pop.className = 'damage-popup';
        pop.innerText = `-${amount}`;
        pop.style.left = '40%';
        pop.style.top = '10%';
        el.appendChild(pop);
        setTimeout(() => pop.remove(), 800);
    }

    function checkFaints() {
        if(state.aiTeam[state.aiIdx].hp <= 0) {
            sounds.faint.currentTime = 0;
            sounds.faint.play().catch((e) => console.log("Faint sound error:", e));
            addLog(`Opponent's **${state.aiTeam[state.aiIdx].name}** fainted!`);
            state.aiIdx++;
            if(state.aiIdx >= 6) return end(true);
            addLog(`Opponent sent out **${state.aiTeam[state.aiIdx].name}**!`);
        }
        if(state.playerTeam[state.playerIdx].hp <= 0) {
            sounds.faint.currentTime = 0;
            sounds.faint.play().catch((e) => console.log("Faint sound error:", e));
            addLog(`**${state.playerTeam[state.playerIdx].name}** fainted!`);
            state.playerIdx++;
            if(state.playerIdx >= 6) return end(false);
            addLog(`Go! **${state.playerTeam[state.playerIdx].name}**!`);
        }
        updateUI();
    }

    function end(win) {
        sounds.battleMusic.pause();
        if (win) {
            sounds.victoryMusic.volume = 0.3;
            sounds.victoryMusic.play().catch(e => console.log("Victory music error:", e));
        }

        const s = document.getElementById('result-screen');
        s.classList.remove('hidden');
        document.getElementById('result-title').innerText = win ? "VICTORY!" : "DEFEAT";
        document.getElementById('result-title').style.color = win ? "#2ecc71" : "#e74c3c";
    }

    function addLog(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>${msg.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</div>`; // Show only last action for mobile clarity
        l.scrollTop = l.scrollHeight;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    document.getElementById('btn-start').onclick = init;
</script>
</body>
</html>
